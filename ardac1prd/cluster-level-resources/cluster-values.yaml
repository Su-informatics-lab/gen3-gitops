karpenter:
  enabled: true
  targetRevision: "1.0.8"

karpenter-crds:
  amiSelectorName: "amazon-eks-node-al2023-x86_64-standard-1.34-*"
  amiOwner: "amazon"
  enabled: true
  usaAlias: true # Temporary workaround for an upstream chart/template typo; remove after upgrading to a chart version that correctly uses `useAlias` only.
  useAlias: true
  alias: "al2023@v20260520"
  selectorTag: ardac1prd
  migration: true
  default:
    consolidationPolicy: "WhenEmpty"
    consolidateAfter: "10m"
    volumeSize: 30Gi
    requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values:
          - spot
      - key: kubernetes.io/arch
        operator: In
        values:
          - amd64
      - key: karpenter.k8s.aws/instance-category
        operator: In
        values:
          - r
          - c
          - m
          - t
      - key: karpenter.k8s.aws/instance-size
        operator: NotIn
        values:
          - nano
          - micro
          - small
  jupyter:
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "10m"
  workflow:
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "10m"

vpc-cni:
  enabled: true
  configuration:
