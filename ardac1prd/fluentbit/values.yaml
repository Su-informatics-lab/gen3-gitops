# No image override — use the chart default (cr.fluentbit.io/fluent/fluent-bit:5.0.5)

env:
  - name: AWS_REGION
    value: "us-east-1"
  - name: LOG_GROUP_NAME
    value: "ardac1prd"
  - name: OPENSEARCH_HOST
    value: "vpc-ardac1prd-gen3-metadata-34ztrt3iey3wvgd36nrpf5gk5m.us-east-1.es.amazonaws.com"

# Lua script to compute CloudWatch stream name as "namespace.pod-name"
luaScripts:
  stream_name.lua: |
    function set_stream_name(tag, timestamp, record)
        local ns = ""
        local pod = ""
        if record["kubernetes"] then
            ns = record["kubernetes"]["namespace_name"] or ""
            pod = record["kubernetes"]["pod_name"] or ""
        end
        if ns ~= "" and pod ~= "" then
            record["cw_stream"] = ns .. "." .. pod
        else
            record["cw_stream"] = tag
        end
        return 1, timestamp, record
    end

config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        Off
        Parsers_File  /fluent-bit/etc/parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['namespace_name'] ^kube-system$

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['namespace_name'] ^logging$

    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/scripts/stream_name.lua
        call    set_stream_name

    # Fork anagine namespace logs into a separate tag for OpenSearch routing.
    # Keep true preserves the original kube.* record so CloudWatch output is unaffected.
    [FILTER]
        Name                  rewrite_tag
        Match                 kube.*
        Rule                  $kubernetes['namespace_name'] ^ardac-anagine$ anagine.raw true
        Emitter_Name          anagine_reemit
        Emitter_Storage.type  filesystem
        Emitter_Mem_Buf_Limit 50M

    # Narrow to INFO-level POST requests with an authenticated user (email).
    # RE2 word-boundary workaround: assert non-alphanumeric chars around INFO.
    [FILTER]
        Name    grep
        Match   anagine.raw
        Regex   log (^|[^[:alnum:]_])INFO([^[:alnum:]_]|$)

    [FILTER]
        Name    grep
        Match   anagine.raw
        Regex   log (user=[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+|"user":\s*"[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+")

    [FILTER]
        Name    grep
        Match   anagine.raw
        Regex   log (method=POST|"method":\s*"POST")

  outputs: |
    [OUTPUT]
        Name                 cloudwatch_logs
        Match                kube.*
        region               ${AWS_REGION}
        log_group_name       ${LOG_GROUP_NAME}
        log_stream_name      fallback-stream
        log_stream_template  $cw_stream
        auto_create_group    true
        log_key              log

    [OUTPUT]
        Name               opensearch
        Match              anagine.raw
        Host               ${OPENSEARCH_HOST}
        Port               443
        Index              anagine-logs
        Suppress_Type_Name On
        AWS_Auth           On
        AWS_Region         ${AWS_REGION}
        AWS_Service        es
        tls                On
        tls.verify         On
        Generate_ID        On
        Retry_Limit        3

serviceAccount:
  create: true
  annotations:
    # Requires IAM role: arn:aws:iam::742378880825:role/gen3-service/ardac1prd-fluentbit-sa
    # Role needs: CloudWatch Logs (logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents)
    #             OpenSearch write access (es:ESHttp*) on the ardac1prd domain
    eks.amazonaws.com/role-arn: "arn:aws:iam::742378880825:role/gen3-service/ardac1prd-fluentbit-sa"
