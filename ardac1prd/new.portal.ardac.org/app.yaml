apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: new-portal-ardac1prd-redirect
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Su-informatics-lab/gen3-gitops.git'
    targetRevision: main
    path: ardac1prd/new.portal.ardac.org/manifests
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
