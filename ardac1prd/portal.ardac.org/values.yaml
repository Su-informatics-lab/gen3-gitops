requestor:
  enabled: false
  externalSecrets:
    dbcreds: "ardac1prd-default-requestor-creds"

revproxy:
  enabled: true

sheepdog:
  enabled: true
  replicaCount: 5
  externalSecrets:
    dbcreds: "ardac1prd-default-sheepdog-creds"

ssjdispatcher:
  enabled: false

sower:
  enabled: false

wts:
  enabled: true
  externalSecrets:
    dbcreds: "ardac1prd-default-wts-creds"
    createWtsOidcClientSecret: false

etl:
  enabled: true
  resources:
    tube:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "1000m"
        memory: "4Gi"
    spark:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "1000m"
        memory: "4Gi"
  etlMapping:
    mappings:
      - name: ardac_case
        doc_type: case
        type: aggregator
        root: case
        props:
          - name: pat_id
            src: submitter_id
          - name: project_id
          - name: cohort
            # src: cohort
            value_mappings:
              - Heavy Drinker with Alcoholic Hepatits: AH cases
              - Heavy Drinker without Alcoholic Hepatits: Heavy Drinking Controls
              - Healthy Donor: Healthy Controls
          - name: study_site
          - name: actarm
          - name: aki_status
          - name: days_180_aki
          - name: days_180_survival
          - name: days_90_aki
          - name: days_90_survival
          - name: days_to_aki
          - name: days_to_death
          - name: vital_status
        parent_props:
          - path: studies[study_name, study_id:submitter_id]
        flatten_props:
          - path: demographics
            props:
              - name: gender
                value_mappings:
                  - female: Female
                  - male: Male
                  - unknown: Unknown
                  - unspecified: Unspecified
                  - not reported: Not reported
                  - None: None
              - name: race
                value_mappings:
                  - white: White
                  - black or african american: Black or African American
                  - asian: Asian
                  - american indian or alaska native: American Indian or Alaska Native
                  - native hawaiian or other pacific islander: Native Hawaiian or other Pacific Islander
                  - other: Other
                  - Unknown: Unknown
                  - More than one race: More than one race
                  - not reported: Not reported
                  - not allowed to contact: Not allowed to contact
                  - None: None
              - name: ethnicity
                value_mappings:
                  - not hispanic or latino: Not Hispanic or Latino
                  - hispanic or latino: Hispanic or Latino
                  - Unknown: Unknown
                  - not reported: Not reported
                  - not allowed to collect: Not allowed to collect
                  - None: None
              - name: year_of_birth
              - name: age_at_index
          - path: audits
            props:
              - name: drinking_frequency
                src: adt0101
              - name: drinks_per_day
                src: adt0102
              - name: frequency_of_heavy_drinking
                src: adt0103
              - name: adt0104
              - name: adt0105
              - name: adt0106
              - name: adt0107
              - name: adt0108
              - name: adt0109
              - name: adt0110
              - name: auditnd
        aggregated_props:
          - name: visit_day
            path: follow_ups
            src: visit_day
            fn: max
          - name: visit_day_set
            path: follow_ups
            src: visit_day
            fn: set
          - name: laboratory_test
            path: follow_ups.molecular_tests
            src: laboratory_test
            fn: set
          - name: all_event_types_test
            path: follow_ups
            src: event_type
            fn: set
            type: keyword
          - name: min_days_to_follow_up_test
            path: follow_ups
            src: days_to_follow_up
            fn: min
            type: integer
          - name: max_days_to_follow_up_test
            path: follow_ups
            src: days_to_follow_up
            fn: max
            type: integer
          - name: meld_score
            path: follow_ups
            src: meld_score
            fn: list
          - name: child_pugh_score
            path: follow_ups
            src: child_pugh_score
            fn: list
          - name: tlfb_drinking_days
            path: follow_ups
            src: tlfb_drinking_days
            fn: list

      - name: ardac_follow_up
        parent_props:
          - path: cases.studies[study_name,study_id:submitter_id]
          - path: cases[pat_id:submitter_id, case_arm:actarm,case_group:cohort,study_site,aki_status,days_180_aki,days_180_survival,days_90_aki,days_90_survival,days_to_aki]
            props:
              - name: cohort
                value_mappings:
                  - Heavy Drinker with Alcoholic Hepatits: AH cases
                  - Heavy Drinker without Alcoholic Hepatits: Heavy Drinking Controls
                  - Healthy Donor: Healthy Controls
          - path: cases.demographics[gender,race,ethnicity,year_of_birth,age_at_index]
            value_mappings:
              - female: Female
              - male: Male
              - unknown: Unknown
              - unspecified: Unspecified
              - not reported: Not reported
              - None: None
        doc_type: follow_up
        type: aggregator
        root: follow_up
        props:
          - name: project_id
          - name: follow_up_id
            src: submitter_id
          - name: visit_day
          - name: bmi
          - name: child_pugh_score
          - name: lille_score
          - name: maddreys_score
          - name: meld_score
          - name: event_type
            src: event_type
          - name: days_to_follow_up
            src: days_to_follow_up
          - name: ascites_culture
          - name: ascites_date
          - name: endoscopy
          - name: hep_carcinoma
          - name: hep_enceph
          - name: hep_enceph_diagnosis_date
          - name: infection_screen_done
          - name: liver_score_date
          - name: liver_transplant
          - name: tlfb_drinking_days
          - name: tlfb_number_drinks
          - name: varices
          - name: varices_diagnosis_date
          - name: weight
        aggregated_props:
          - name: laboratory_test
            path: molecular_tests
            src: laboratory_test
            fn: set
          - name: specimen_type
            path: aliquots
            src: specimen_type
            fn: set

      - name: ardac_biospecimen
        doc_type: aliquot
        type: aggregator
        root: aliquot
        props:
          - name: project_id
          - name: aliquot_id
            src: submitter_id
          - name: specimen_type
        parent_props:
          - path: follow_ups[follow_up_id:submitter_id, visit_day].cases[pat_id:submitter_id, case_arm:actarm].studies[study_name, study_id:submitter_id]
          - path: follow_ups.cases[pat_id:submitter_id, case_arm:actarm, case_group:cohort, study_site, aki_status, days_180_aki, days_180_survival, days_90_aki, days_90_survival, days_to_aki]
          - path: labs[lab_id:submitter_id, lab_name:name_of_institute, PI_name]
          - path: follow_ups.cases.demographics[gender, race, ethnicity, year_of_birth, age_at_index]

      - name: ardac_lab_result
        doc_type: molecular_test
        type: aggregator
        root: molecular_test
